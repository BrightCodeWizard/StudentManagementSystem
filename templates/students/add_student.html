{% extends 'base.html' %}

{% block title %}Add Student{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Add Student</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary">

                    Save Student

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
